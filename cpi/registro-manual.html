<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPI - Registro Manual</title>
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/css/intlTelInput.css">

  <style>
    :root {
      --color-primary: #8f5e38;
      --color-cream: #fcfaf3;
      --color-dark: #1a1a1a;
      --color-grey: #8a8880;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      scrollbar-width: none;
    }

    html::-webkit-scrollbar, body::-webkit-scrollbar {
      display: none;
    }

    body {
      font-family: 'Barlow Condensed', Arial, sans-serif;
      background: transparent;
      padding: 0;
      color: var(--color-dark);
    }

    .container {
      background: var(--color-cream);
      border-radius: 12px;
      padding: 0;
      width: 100%;
      min-height: 100%;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }


    .header {
      position: relative;
      background: #fffdf8;
      padding: 16px 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .body-content {
      padding: 12px;
    }

    .header-right {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--color-primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Close X — matches lotModal header-control close-x */
    .close-x {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.3s ease;
      background: none;
      border: none;
      padding: 0;
    }

    .close-x:hover { background-color: rgba(0,0,0,0.05); }

    .close-x svg {
      width: 12px;
      height: 12px;
      stroke: #888;
      stroke-width: 1.5px;
      transition: all 0.4s ease;
      transform-origin: center;
      transform-box: fill-box;
    }

    .close-x:hover svg { transform: rotate(360deg); stroke: #666; }

    .subtitle {
      color: var(--color-grey);
      font-size: 16px;
      text-align: center;
      margin-bottom: 12px;
      line-height: 1.4;
      font-weight: 500;
    }

    .form-group { margin-bottom: 0px; }

    label {
      display: block;
      color: var(--color-dark);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .iti { width: 100%; }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0ddd5;
      border-radius: 8px;
      font-size: 18px;
      font-family: 'Barlow Condensed', sans-serif;
      transition: all 0.2s;
      background: #fff;
    }

    input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(143, 94, 56, 0.1);
    }

    .name-row {
      display: flex;
      gap: 10px;
    }

    .name-row .form-group { flex: 1; }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 10px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      font-family: 'Barlow Condensed', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.5px;
    }

    button:hover { filter: brightness(0.7); text-decoration: underline; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #ccc; cursor: not-allowed; filter: none; text-decoration: none; }

    .error-message {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      text-align: center;
    }

    #formContainer.hidden { display: none; }

    .result-container { display: none; text-align: center; animation: fadeIn 0.4s; }
    .result-container.show { display: block; }

    .link-box {
      background: #fff;
      border: 2px solid #e0ddd5;
      border-radius: 8px;
      padding: 14px;
      margin: 20px 0;
      word-break: break-all;
      font-size: 14px;
      color: var(--color-dark);
      text-align: left;
      line-height: 1.5;
    }

    .btn-copy {
      background: var(--color-dark);
      margin-bottom: 10px;
    }

    .btn-whatsapp {
      background: #25D366;
      margin-bottom: 10px;
    }

    .btn-another {
      background: transparent;
      color: var(--color-grey);
      border: 2px solid #e0ddd5;
      font-size: 14px;
      padding: 12px;
    }

    .btn-another:hover { background: rgba(0,0,0,0.03); filter: none; text-decoration: underline; }

    .icon-circle {
      width: 64px;
      height: 64px;
      background: rgba(143, 94, 56, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .icon-circle svg {
      width: 32px;
      height: 32px;
      stroke: var(--color-primary);
      stroke-width: 2.5;
      fill: none;
    }

    .status-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--color-dark);
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="header">
      <div class="header-title">Registro</div>
      <div class="header-right">
        <button class="close-x" onclick="window.parent.postMessage('closeRegistro','*')" title="Cerrar">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
            <path d="M4 4 L12 12 M12 4 L4 12" fill="none"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="body-content">
      <div id="formContainer">
        <p class="subtitle">Registra un lead y obtén el link de acceso al instante.</p>

        <div class="error-message" id="errorMessage" style="display: none;"></div>

        <form id="registroForm">
          <div class="name-row">
            <div class="form-group">
              <label for="firstName">Nombre</label>
              <input type="text" id="firstName" placeholder="Opcional">
            </div>
            <div class="form-group">
              <label for="lastName">Apellido</label>
              <input type="text" id="lastName" placeholder="Opcional">
            </div>
          </div>
          <div class="form-group">
            <label for="phone">WhatsApp</label>
            <input type="tel" id="phone" name="phone" required>
          </div>
          <div class="name-row">
            <div class="form-group">
              <label for="assignedAgent">Agente</label>
              <select id="assignedAgent" style="width:100%;padding:14px 16px;border:2px solid #e0ddd5;border-radius:8px;font-size:18px;font-family:'Barlow Condensed',sans-serif;background:#fff;transition:all 0.2s;appearance:none;-webkit-appearance:none;cursor:pointer;">
                <option value="">Sin asignar</option>
              </select>
            </div>
            <div class="form-group">
              <label for="campaign">Campaña</label>
              <input type="text" id="campaign" placeholder="Opcional">
            </div>
          </div>
          <button type="submit" id="submitBtn">Registrar</button>
        </form>
      </div>

      <div class="result-container" id="resultContainer">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h2 class="status-title">Link generado</h2>
        <div class="link-box" id="linkBox"></div>
        <button class="btn-copy" onclick="copyLink()">Copiar Link</button>
        <button class="btn-whatsapp" onclick="sendWhatsApp()">Enviar por WhatsApp</button>
        <button class="btn-another" onclick="resetForm()">Registrar otro</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/intlTelInput.min.js"></script>
  <script src="client-config.js"></script>

  <script>
    const CURRENT_CLIENT = 'cpi';
    applyColorsToCSS(CURRENT_CLIENT);

    const phoneInput = document.querySelector("#phone");
    const iti = window.intlTelInput(phoneInput, {
      initialCountry: "mx",
      preferredCountries: ["mx", "us", "ar", "es"],
      separateDialCode: true,
      utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js",
    });

    function formatForWhatsApp() {
      const data = iti.getSelectedCountryData();
      const rawDigits = iti.getNumber().replace(/\D/g, '');
      const iso = data.iso2;

      if (iso === 'mx') {
        if (rawDigits.startsWith('52') && !rawDigits.startsWith('521')) {
          return '521' + rawDigits.substring(2);
        }
      }

      if (iso === 'ar') {
        if (rawDigits.startsWith('54') && !rawDigits.startsWith('549')) {
          return '549' + rawDigits.substring(2);
        }
      }

      return rawDigits;
    }

    let supabaseClient;
    const IS_DEMO = new URLSearchParams(location.search).has('demo');

    // Get agent phone from parent window (passed when opened from index.html)
    const parentAgentPhone = window.parent?.currentLead?.phone || null;

    fetch('https://la-la.land/sb_config.json')
      .then(r => r.json())
      .then(async (cfg) => {
        supabaseClient = window.supabase.createClient(cfg.url, cfg.key);
        console.log('Supabase client initialized');
        await loadAgentsDropdown();
      })
      .catch(e => {
        console.error('Failed to load Supabase config:', e);
      });

    async function loadAgentsDropdown() {
      try {
        if (IS_DEMO) {
          const fakeAgents = [
            { phone: '5210000000001', name: 'María', last_name: 'García' },
            { phone: '5210000000002', name: 'Carlos', last_name: 'López' },
            { phone: '5210000000003', name: 'Ana', last_name: 'Rodríguez' },
            { phone: '5210000000004', name: 'Diego', last_name: 'Martínez' },
            { phone: '5210000000005', name: 'Sofía', last_name: 'Hernández' },
          ];
          const select = document.getElementById('assignedAgent');
          fakeAgents.forEach(agent => {
            const opt = document.createElement('option');
            opt.value = agent.phone;
            opt.textContent = `${agent.name} ${agent.last_name}`;
            select.appendChild(opt);
          });
          return;
        }

        const { data: agents, error } = await supabaseClient
          .from('leads')
          .select('phone, name, last_name')
          .contains('is_agent', [CURRENT_CLIENT])
          .eq('is_demo', false)
          .order('name', { ascending: true });

        if (error || !agents) return;

        const select = document.getElementById('assignedAgent');
        agents.forEach(agent => {
          const opt = document.createElement('option');
          opt.value = agent.phone;
          const fullName = `${agent.name || ''} ${agent.last_name || ''}`.trim() || agent.phone;
          opt.textContent = fullName;
          select.appendChild(opt);
        });

        // Auto-select current agent if opened from index.html
        if (parentAgentPhone) {
          select.value = parentAgentPhone;
        }
      } catch (e) {
        console.error('Error loading agents:', e);
      }
    }

    function generateToken() {
      const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
      let token = '';
      for (let i = 0; i < 10; i++) {
        token += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return token;
    }

    // State for result screen
    // Restore last campaign from localStorage
    const savedCampaign = localStorage.getItem('registro_manual_campaign') || '';
    document.getElementById('campaign').value = savedCampaign;

    let generatedLink = '';
    let generatedPhone = '';
    let generatedName = '';

    document.getElementById('registroForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitBtn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMessage');
      errorMsg.style.display = 'none';

      submitBtn.disabled = true;
      submitBtn.textContent = 'Procesando...';

      if (!iti.isValidNumber()) {
        errorMsg.textContent = 'Numero invalido. Revisa los digitos.';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Generar Link';
        return;
      }

      const phone = formatForWhatsApp();
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const campaign = document.getElementById('campaign').value.trim();
      const assignedAgent = document.getElementById('assignedAgent').value || null;

      // Persist campaign for next use
      if (campaign) localStorage.setItem('registro_manual_campaign', campaign);

      if (!supabaseClient) {
        alert('Cargando... Por favor intenta de nuevo en unos segundos.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Generar Link';
        return;
      }

      try {
        // In demo mode, fake the entire flow — no Supabase writes
        if (IS_DEMO) {
          const fakeToken = 'DEMO_' + generateToken();
          generatedLink = `https://la-la.land/${CURRENT_CLIENT}/index.html?token=${fakeToken}`;
          generatedPhone = phone;
          generatedName = firstName;

          document.getElementById('linkBox').textContent = generatedLink;
          document.getElementById('formContainer').classList.add('hidden');
          document.getElementById('resultContainer').classList.add('show');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Generar Link';
          return;
        }

        let { data: existingLead } = await supabaseClient
          .from('leads')
          .select('id, client_id, assigned_agent')
          .eq('phone', phone)
          .single();

        let leadId;

        if (existingLead) {
          // Block if lead is already registered for this client
          const currentClients = existingLead.client_id || [];
          if (currentClients.includes(CURRENT_CLIENT)) {
            errorMsg.textContent = 'Este número ya está registrado para ' + CURRENT_CLIENT.toUpperCase() + '.';
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Registrar';
            return;
          }

          leadId = existingLead.id;

          const updateData = {
            last_seen_at: new Date().toISOString(),
            client_id: [...currentClients, CURRENT_CLIENT],
          };
          if (firstName) updateData.name = firstName;
          if (lastName) updateData.last_name = lastName;
          if (campaign) updateData.campaign = campaign;
          if (assignedAgent) {
            const existingAgents = (typeof existingLead.assigned_agent === 'object' && existingLead.assigned_agent) || {};
            updateData.assigned_agent = { ...existingAgents, [CURRENT_CLIENT]: assignedAgent };
            if (parentAgentPhone && assignedAgent === parentAgentPhone) {
              updateData.agent_accepted_at = new Date().toISOString();
            } else {
              updateData.agent_assigned_at = { [CURRENT_CLIENT]: new Date().toISOString() };
              updateData.assigned_by = { [CURRENT_CLIENT]: parentAgentPhone || 'admin' };
            }
          }

          await supabaseClient
            .from('leads')
            .update(updateData)
            .eq('id', leadId);
        } else {
          const insertData = {
            phone,
            client_id: [CURRENT_CLIENT],
          };
          if (firstName) insertData.name = firstName;
          if (lastName) insertData.last_name = lastName;
          insertData.campaign = campaign || '-';
          if (assignedAgent) {
            insertData.assigned_agent = { [CURRENT_CLIENT]: assignedAgent };
            if (parentAgentPhone && assignedAgent === parentAgentPhone) {
              insertData.agent_accepted_at = new Date().toISOString();
            } else {
              insertData.agent_assigned_at = { [CURRENT_CLIENT]: new Date().toISOString() };
              insertData.assigned_by = { [CURRENT_CLIENT]: parentAgentPhone || 'admin' };
            }
          }

          const { data: newLead, error: leadError } = await supabaseClient
            .from('leads')
            .insert(insertData)
            .select('id')
            .single();

          if (leadError) throw leadError;
          leadId = newLead.id;
        }

        const token = generateToken();

        const { error: tokenError } = await supabaseClient
          .from('lead_tokens')
          .insert({ lead_id: leadId, token });

        if (tokenError) throw tokenError;

        // Build result
        generatedLink = `https://la-la.land/${CURRENT_CLIENT}/index.html?token=${token}`;
        generatedPhone = phone;
        generatedName = firstName;

        document.getElementById('linkBox').textContent = generatedLink;
        document.getElementById('formContainer').classList.add('hidden');
        document.getElementById('resultContainer').classList.add('show');

      } catch (error) {
        console.error('Error:', error);
        errorMsg.textContent = 'Hubo un error. Por favor intenta de nuevo.';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Generar Link';
      }
    });

    function copyLink() {
      navigator.clipboard.writeText(generatedLink).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.textContent = 'Copiado!';
        setTimeout(() => { btn.textContent = 'Copiar Link'; }, 2000);
      });
    }

    function sendWhatsApp() {
      const greeting = generatedName
        ? `Hola ${generatedName}!`
        : 'Hola!';
      const message = `${greeting}\n\nAqui esta tu acceso al Master Plan de ${CURRENT_CLIENT.toUpperCase()}:\n\n${generatedLink}\n\nExplora disponibilidad y precios.`;
      const encoded = encodeURIComponent(message);
      window.open(`https://wa.me/${generatedPhone}?text=${encoded}`, '_blank');
    }

    function resetForm() {
      document.getElementById('formContainer').classList.remove('hidden');
      document.getElementById('resultContainer').classList.remove('show');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = 'Generar Link';
      document.getElementById('firstName').value = '';
      document.getElementById('lastName').value = '';
      phoneInput.value = '';
      generatedLink = '';
      generatedPhone = '';
      generatedName = '';
    }
  </script>
</body>
</html>
