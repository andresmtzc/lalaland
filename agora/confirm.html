<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmando acceso...</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Barlow Condensed', Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fcfaf3;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .icon-circle {
      width: 64px;
      height: 64px;
      background: rgba(233, 24, 67, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .icon-circle svg {
      width: 32px;
      height: 32px;
      stroke: #e91843;
      stroke-width: 2.5;
      fill: none;
    }
    .icon { font-size: 52px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; text-transform: uppercase; }
    p { color: #8a8880; font-size: 17px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon">⏳</div>
    <h1>Confirmando...</h1>
    <p>Un momento.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (async function() {
    const params  = new URLSearchParams(location.search);
    const token   = params.get('token');
    const browser = params.get('browser');
    const card    = document.getElementById('card');

    function showSuccess() {
      card.innerHTML = `
        <div class="icon-circle">
          <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h1>¡Listo!</h1>
        <p>Redirigiendo al mapa...</p>`;
    }

    function showError(msg) {
      card.innerHTML = `
        <div class="icon-circle">
          <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h1>Error</h1>
        <p>${msg}</p>`;
    }

    if (!token) {
      showError('Link inválido. Parámetros faltantes.');
      return;
    }

    try {
      const cfg = await fetch('https://la-la.land/sb_config.json').then(r => r.json());
      const sb  = supabase.createClient(cfg.url, cfg.key);

      let query = sb
        .from('link_requests')
        .update({ activated_at: new Date().toISOString() })
        .eq('token', token);
      if (browser) query = query.eq('browser_id', browser);
      const { data, error } = await query.select('client').single();

      if (error || !data) throw error || new Error('not found');

      showSuccess();
      setTimeout(() => {
        window.location.href = `https://la-la.land/${data.client}/index.html?token=${token}`;
      }, 1500);

    } catch(e) {
      console.error(e);
      showError('No se pudo confirmar. Intenta de nuevo.');
    }
  })();
  </script>
</body>
</html>
