<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads Cleaner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary: #e91843;
    --color-cream: #fcfaf3;
    --color-dark: #1a1a1a;
    --color-gray: #8a8880;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; scrollbar-width: none; }
  html::-webkit-scrollbar, body::-webkit-scrollbar { display: none; }

  body {
    font-family: 'Barlow Condensed', Arial, sans-serif;
    background: var(--color-cream);
    color: var(--color-dark);
    min-height: 100vh;
  }

  header {
    position: relative;
    background: #fffdf8;
    padding: 16px 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 1px solid #e0ddd5;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--color-primary);
  }

  header span {
    position: absolute;
    right: 52px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    color: var(--color-gray);
  }

  .main {
    padding: 12px;
  }

  /* Drop Zone */
  #dropzone {
    border: 1.5px dashed #e0ddd5;
    border-radius: 8px;
    padding: 4rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: #fff;
  }

  #dropzone:hover, #dropzone.drag-over {
    border-color: var(--color-primary);
    background: #fff8f9;
  }

  #dropzone.drag-over::after {
    content: 'SOLTAR';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    font-weight: 700;
    color: var(--color-primary);
    background: rgba(233,24,67,0.04);
    border-radius: 8px;
  }

  #dropzone .icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  #dropzone p {
    color: var(--color-gray);
    font-size: 14px;
    line-height: 1.7;
  }

  #dropzone strong {
    color: var(--color-primary);
    font-weight: 600;
  }

  #fileInput { display: none; }

  /* Stats bar */
  #stats-bar {
    display: none;
    gap: 8px;
    margin: 12px 0 0;
    flex-wrap: nowrap;
    overflow-x: auto;
  }

  .stat {
    background: #fff;
    border-radius: 8px;
    padding: 6px 10px;
    border: 1px solid #e0ddd5;
    flex: 1;
    min-width: 0;
    text-align: center;
  }

  .stat .label {
    font-size: 10px;
    color: var(--color-gray);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stat .value {
    font-size: 20px;
    font-weight: 700;
    color: var(--color-primary);
    line-height: 1.1;
  }

  /* Actions */
  #actions {
    display: none;
    gap: 8px;
    margin: 10px 0;
  }

  button {
    font-family: 'Barlow Condensed', Arial, sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 3px;
    border: none;
    background: var(--color-primary);
    color: var(--color-cream);
    cursor: pointer;
    transition: all 0.3s ease;
    white-space: nowrap;
  }

  button:hover { text-decoration: underline; }

  button.secondary {
    background: none;
    border: 1px solid #e0ddd5;
    color: var(--color-gray);
  }

  button.secondary:hover { background: rgba(0,0,0,0.05); text-decoration: none; }

  /* Table */
  #table-wrap {
    display: none;
    background: #fff;
    border-radius: 8px;
    overflow-x: auto;
    border: 1px solid #e0ddd5;
    margin-top: 10px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead { background: var(--color-primary); color: var(--color-cream); }

  th {
    padding: 10px 8px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid #e0ddd5;
    transition: background 0.2s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #faf8f3; }

  td { padding: 8px; font-size: 13px; }

  td.empty { color: var(--color-gray); }

  .tag {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-fb { background: #e8f0fe; color: #1a73e8; }
  .tag-ig { background: #fce4ec; color: #e91843; }
  .tag-leads { background: #e8f5e9; color: #2e7d32; }
  .tag-vivir { background: #e8f5e9; color: #2e7d32; }
  .tag-invertir { background: #fff8e1; color: #f57f17; }

  .fuente-select {
    font-family: 'Barlow Condensed', Arial, sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 4px;
    border: 1px solid #e0ddd5;
    border-radius: 3px;
    background: #fff;
    color: var(--color-dark);
    cursor: pointer;
    outline: none;
  }
  .fuente-select:focus { border-color: var(--color-primary); }

  /* Error */
  #error-msg {
    display: none;
    padding: 10px 14px;
    background: #fff0f2;
    border: 1px solid var(--color-primary);
    border-radius: 8px;
    color: var(--color-primary);
    font-size: 13px;
    margin-top: 10px;
  }

  .reset-btn {
    margin-top: 10px;
    display: none;
  }

  #empty-cols-note {
    font-size: 11px;
    color: var(--color-gray);
    margin-top: 6px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Leads Cleaner</h1>
  <span>Meta Ads CSV → CRM Format</span>
</header>

<div class="main">

  <div id="dropzone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">⬆</div>
    <p>Arrastra tu CSV aquí<br>o <strong>haz clic para seleccionar</strong></p>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <div id="error-msg"></div>

  <div id="stats-bar" style="display:flex">
    <div class="stat"><div class="label">Total Leads</div><div class="value" id="stat-total">0</div></div>
    <div class="stat"><div class="label">Proyectos</div><div class="value" id="stat-proyectos">0</div></div>
    <div class="stat"><div class="label">Plataformas</div><div class="value" id="stat-platforms">—</div></div>
    <div class="stat"><div class="label">Rango Fechas</div><div class="value" id="stat-dates" style="font-size:1rem;padding-top:0.4rem">—</div></div>
  </div>

  <p id="empty-cols-note">* Atd. y Asignado se llenan manualmente.</p>

  <div id="actions" style="display:flex">
    <button onclick="downloadCSV()">↓ Descargar CSV limpio</button>
    <button class="secondary" onclick="resetTool()">✕ Limpiar</button>
  </div>

  <div id="table-wrap">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script>
const COLS = ['Fecha','Nombre','Cel.','Correo','Proyecto','Fuente','Interés','Enganche','Preferencia','Atd.','Asignado','Campaña'];
const FUENTE_OPTS = ['Campaña','Whatsapp','FB/IG','Influencer','Telefono','Visita'];

let cleanedData = [];

// Drag & drop
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) processFile(e.target.files[0]);
});

function processFile(file) {
  if (!file.name.endsWith('.csv')) { showError('Por favor sube un archivo .csv'); return; }
  const reader = new FileReader();
  reader.onload = e => parseCSV(e.target.result);
  reader.readAsText(file, 'latin1');
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim().replace(/,+/g, '').trim() !== '');
  if (lines.length < 2) { showError('El archivo no tiene datos.'); return; }

  const headers = parseRow(lines[0]).map(h => h.trim().toLowerCase());

  const idx = name => headers.findIndex(h => h.includes(name));

  const iCreated   = idx('created_time');
  const iName      = idx('full name');
  const iPhone     = idx('phone');
  const iEmail     = idx('email');
  const iAdset     = idx('adset_name');
  const iPlatform  = idx('platform');
  const iInteres   = headers.findIndex(h => h.includes('vivir') || h.includes('buscas'));
  const iEnganche  = headers.findIndex(h => h.includes('enganche'));
  const iPref      = headers.findIndex(h => h.includes('contacten') || h.includes('deseas'));
  const iCampaign  = idx('ad_name');
  const iFuente    = idx('fuente');

  if (iCreated === -1 || iName === -1) { showError('No se reconoce el formato del CSV. ¿Es un dump de Meta Ads?'); return; }

  cleanedData = [];

  for (let i = 1; i < lines.length; i++) {
    const row = parseRow(lines[i]);
    if (!row[iName] || !row[iName].trim()) continue;

    const proyecto = extractLastWord(row[iAdset] || '');
    const enganche = extractEnganche(row[iEnganche] || '');
    const fecha    = formatDate(row[iCreated] || '');
    const fuente   = iFuente !== -1 ? normalizeFuente(row[iFuente] || '') : 'Campaña';
    const pref     = capitalize(cleanValue(row[iPref] || ''));
    const interes  = capitalize(cleanValue(row[iInteres] || ''));
    const campaña  = cleanCampaignName(row[iCampaign] || '');

    cleanedData.push({
      'Fecha':      fecha,
      'Nombre':     capitalize(row[iName] || ''),
      'Cel.':       row[iPhone] || '',
      'Correo':     (row[iEmail] || '').trim(),
      'Proyecto':   proyecto,
      'Fuente':     fuente,
      'Interés':    interes,
      'Enganche':   enganche,
      'Preferencia':pref,
      'Atd.':       '',
      'Asignado':   '',
      'Campaña':    campaña,
    });
  }

  if (cleanedData.length === 0) { showError('No se encontraron leads con datos completos.'); return; }

  hideError();
  renderTable();
  renderStats();
  document.getElementById('stats-bar').style.display = 'flex';
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('table-wrap').style.display = 'block';
  document.getElementById('empty-cols-note').style.display = 'block';
  dz.style.display = 'none';
}

function parseRow(line) {
  const result = [];
  let inQ = false, cur = '';
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result.map(v => v.trim().replace(/^"|"$/g, ''));
}

function extractLastWord(str) {
  // e.g. "26_ENE Leads CAMPESTRE" → "Campestre"
  const cleaned = str.replace(/_/g, ' ').trim();
  const parts = cleaned.split(/\s+/);
  const last = parts[parts.length - 1] || str;
  return capitalize(last.toLowerCase());
}

function extractEnganche(str) {
  // find a number followed by %
  const match = str.match(/(\d+)\s*%/);
  if (match) return match[1] + '%';
  // fallback: find number
  const num = str.match(/(\d+)/);
  if (num) return num[1] + '%';
  return cleanValue(str);
}

function formatDate(str) {
  // "1/5/26" → "2026-01-05"
  const parts = str.split('/');
  if (parts.length === 3) {
    const m = parts[0].padStart(2,'0');
    const d = parts[1].padStart(2,'0');
    const y = parts[2].length === 2 ? '20' + parts[2] : parts[2];
    return `${y}-${m}-${d}`;
  }
  return str;
}

function cleanValue(str) {
  return str.replace(/_/g, ' ').replace(/\s+/g, ' ').trim();
}

function cleanCampaignName(str) {
  // "26_Campestre Ene Ad 1" → keep as is, just clean underscores
  return str.replace(/^[\d_]+/, '').replace(/_/g, ' ').trim() || str;
}

function normalizeFuente(str) {
  const s = str.toLowerCase().trim();
  if (s.includes('campa'))                                    return 'Campaña';
  if (s.includes('whatsapp') || s.includes('whats'))         return 'Whatsapp';
  if (s.includes('facebook') || s.includes('instagram') ||
      s.includes('fb') || s.includes('ig'))                  return 'FB/IG';
  if (s.includes('influencer'))                              return 'Influencer';
  if (s.includes('tel') || s.includes('llam'))               return 'Telefono';
  if (s.includes('visita') || s.includes('visit'))           return 'Visita';
  return FUENTE_OPTS.includes(str) ? str : 'Campaña';
}

function capitalize(str) {
  return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function renderTable() {
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');

  thead.innerHTML = '<tr>' + COLS.map(c => `<th>${c}</th>`).join('') + '</tr>';

  tbody.innerHTML = cleanedData.map((row, i) => {
    const cells = COLS.map(col => {
      const v = row[col] || '';

      if (col === 'Fuente') {
        const opts = FUENTE_OPTS.map(o => `<option${o === v ? ' selected' : ''}>${o}</option>`).join('');
        return `<td><select class="fuente-select" onchange="cleanedData[${i}]['Fuente']=this.value">${opts}</select></td>`;
      }

      if (!v) return `<td class="empty">—</td>`;

      let display = v;
      if (col === 'Interés') {
        const cls = v.toLowerCase().includes('invertir') ? 'tag-invertir' : 'tag-vivir';
        display = `<span class="tag ${cls}">${v}</span>`;
      }
      return `<td>${display}</td>`;
    });
    return '<tr>' + cells.join('') + '</tr>';
  }).join('');
}

function renderStats() {
  document.getElementById('stat-total').textContent = cleanedData.length;

  const proyectos = new Set(cleanedData.map(r => r['Proyecto']));
  document.getElementById('stat-proyectos').textContent = proyectos.size;

  const platforms = [...new Set(cleanedData.map(r => r['Fuente']))];
  document.getElementById('stat-platforms').textContent = platforms.join(', ');

  const dates = cleanedData.map(r => r['Fecha']).filter(Boolean).sort();
  if (dates.length) {
    const first = dates[0].slice(5).replace('-','/');
    const last  = dates[dates.length-1].slice(5).replace('-','/');
    document.getElementById('stat-dates').textContent = first === last ? first : `${first} – ${last}`;
  }
}

function downloadCSV() {
  const header = COLS.join(',');
  const rows = cleanedData.map(row =>
    COLS.map(c => {
      const v = row[c] || '';
      return v.includes(',') || v.includes('"') ? `"${v.replace(/"/g,'""')}"` : v;
    }).join(',')
  );
  const blob = new Blob(['\uFEFF' + [header, ...rows].join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'leads_limpio.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

function resetTool() {
  cleanedData = [];
  document.getElementById('stats-bar').style.display = 'none';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('table-wrap').style.display = 'none';
  document.getElementById('empty-cols-note').style.display = 'none';
  document.getElementById('tbody').innerHTML = '';
  document.getElementById('fileInput').value = '';
  dz.style.display = 'block';
  hideError();
}
</script>
</body>
</html>
