<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Desarrollo - Explora el Mapa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }

    header {
      background: #1a1a1a;
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 20px; letter-spacing: 2px; text-transform: uppercase; }
    header nav a {
      color: #ccc;
      text-decoration: none;
      margin-left: 24px;
      font-size: 14px;
    }

    .hero {
      padding: 48px 32px 24px;
      text-align: center;
    }
    .hero h2 { font-size: 32px; margin-bottom: 8px; }
    .hero p { color: #666; font-size: 16px; }

    .map-wrapper {
      margin: 0 auto 48px;
      max-width: 1200px;
      width: 95%;
      height: 700px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    }
    .map-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>

  <header>
    <h1>Desarrollo Vista Hermosa</h1>
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Ubicación</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <div class="hero">
    <h2>Encuentra tu lote ideal</h2>
    <p>Explora el mapa interactivo y descubre disponibilidad en tiempo real.</p>
  </div>

  <div class="map-wrapper">
    <iframe
      src="https://la-la.land/agora/index.html"
      allowfullscreen
    ></iframe>
  </div>

  <footer>
    © 2026 Desarrollo Vista Hermosa. Todos los derechos reservados.
  </footer>

</body>
</html>
